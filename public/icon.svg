<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 哑铃 -->
  <g transform="translate(256,220)" fill="none" stroke="#22c55e" stroke-width="24" stroke-linecap="round">
    <!-- 横杆 -->
    <line x1="-80" y1="0" x2="80" y2="0"/>
    <!-- 左配重 -->
    <rect x="-160" y="-60" width="80" height="120" rx="16" fill="#22c55e" stroke="none"/>
    <line x1="-120" y1="-60" x2="-120" y2="60" stroke="#166534" stroke-width="4"/>
    <line x1="-80" y1="-60" x2="-80" y2="60" stroke="#166534" stroke-width="4"/>
    <!-- 右配重 -->
    <rect x="80" y="-60" width="80" height="120" rx="16" fill="#22c55e" stroke="none"/>
    <line x1="120" y1="-60" x2="120" y2="60" stroke="#166534" stroke-width="4"/>
    <line x1="160" y1="-60" x2="160" y2="60" stroke="#166534" stroke-width="4"/>
  </g>
  <!-- AI 文字 -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="48" fill="#22c55e">FitAI</text>
  <text x="256" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="#4ade80" opacity="0.8">智能健身</text>
</svg>
